# Nginx Production Configuration — TLS 1.3, HTTP -> HTTPS Redirect, HSTS, and Load Balancing

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # SECURITY: Hide Nginx version

    # ── GZIP Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Load Balancing Upstream ───────────────────────────────────────────────
    upstream backend_servers {
        # ip_hash enables sticky sessions for WebSocket connections
        ip_hash;
        server backend:5000;
        keepalive 32;
    }

    # ── HTTP -> HTTPS Redirect ────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name smartpos.oi;

        return 301 https://$host$request_uri;
    }

    # ── HTTPS Configuration ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name smartpos.oi;

        # SSL Certificates
        ssl_certificate /etc/nginx/ssl/smartpos.crt;
        ssl_certificate_key /etc/nginx/ssl/smartpos.key;

        # SECURITY FIX: Secure TLS settings
        ssl_protocols TLSv1.3; # Enable TLS 1.3 only
        ssl_prefer_server_ciphers off;

        # Session cache
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Limit request size to 10MB
        client_max_body_size 10m;

        # ── Reverse Proxy to Backend API ──────────────────────────────────────
        location / {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            # WebSocket Support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Request headers forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Metrics endpoint protection (allow only internal/admin IPs) ───────
        location /metrics {
            proxy_pass http://backend_servers/metrics;
            # In production, restrict access to prometheus server IP
            # allow 10.0.0.0/8;
            # deny all;
        }
    }
}
