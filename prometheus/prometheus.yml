# Prometheus Global Configuration
global:
  scrape_interval: 15s     # Scrape metrics every 15 seconds by default
  evaluation_interval: 15s # Evaluate rules every 15 seconds

# Alerting (optional, ready for rules configuration)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

# Scrape configurations containing endpoints to monitor
scrape_configs:
  - job_name: 'smartpos-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000'] # Resolves to backend container in docker-compose network
