# Docker Compose — SmartPOS Production Stack
# Covers: Backend API + PostgreSQL + Redis (future) + Nginx reverse proxy

version: '3.9'

services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartpos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartpos}
      POSTGRES_USER: ${POSTGRES_USER:-smartpos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"  # Only expose in dev — remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartpos_user} -d ${POSTGRES_DB:-smartpos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartpos_net

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-smartpos_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smartpos}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://smartposoi.vercel.app}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
    ports:
      - "5000:5000"  # Backend API port
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - smartpos_net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  # Handles SSL termination, load balancing, and static file serving
  nginx:
    image: nginx:1.25-alpine
    container_name: smartpos_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - smartpos_net

networks:
  smartpos_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
